name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.environment == 'staging')
    permissions:
      contents: read
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to staging server
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          ssh -o StrictHostKeyChecking=no $STAGING_USER@$STAGING_HOST << 'ENDSSH'
            cd /opt/survey-app

            # Pull latest images
            docker compose pull

            # Schema updates are handled automatically by Hibernate DDL-auto on backend startup
            echo "Schema updates will run automatically on backend startup"

            # Rolling restart
            docker compose up -d --no-deps backend
            sleep 10
            docker compose up -d --no-deps frontend

            # Health check
            timeout 60 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'
            echo "Staging deployment successful!"
          ENDSSH

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    permissions:
      contents: read
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Deploy to production server
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_PROD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_PROD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          ssh -o StrictHostKeyChecking=no $PRODUCTION_USER@$PRODUCTION_HOST << 'ENDSSH'
            cd /opt/survey-app

            # Backup database before pulling new images (containers must already be running)
            mkdir -p /opt/backups
            docker compose exec -T postgres pg_dump -U surveyuser survey_db \
              > /opt/backups/survey_db_$(date +%Y%m%d_%H%M%S).sql \
              && echo "Database backup created" \
              || echo "Warning: database backup failed (continuing deployment)"

            # Pull latest images
            docker compose pull

            # Schema updates are handled automatically by Hibernate DDL-auto on backend startup
            echo "Schema updates will run automatically on backend startup"

            # Zero-downtime rolling restart
            docker compose up -d --no-deps backend
            sleep 15
            timeout 60 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'

            docker compose up -d --no-deps frontend

            echo "Production deployment successful!"
          ENDSSH

      - name: Notify deployment
        if: always()
        run: echo "Deployment to production completed with status ${{ job.status }}"
