name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat << EOF > .env
          DB_PASSWORD=test_password
          JWT_SECRET=test_jwt_secret_key_for_ci_environment
          POSTGRES_DB=survey_db
          POSTGRES_USER=surveyuser
          POSTGRES_PASSWORD=test_password
          EOF

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.yml up -d --build
        env:
          DB_PASSWORD: test_password
          JWT_SECRET: test_jwt_secret_key_for_ci_environment

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for backend to be ready..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'
          echo "Waiting for frontend to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000; do sleep 3; done'

      - name: Run database migration check
        run: |
          docker compose exec -T backend sh -c \
            'wget -q -O - http://localhost:8080/actuator/health/db | grep -q "UP"'

      - name: Run API smoke tests
        run: |
          # Health check
          curl -sf http://localhost:8080/actuator/health

          # Auth endpoint
          curl -sf -X POST http://localhost:8080/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"testuser","email":"test@example.com","password":"TestPass123!"}' \
            -o /dev/null -w "%{http_code}" | grep -q "200\|201"

          echo "API smoke tests passed!"

      - name: Set up Node.js for E2E tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install E2E test dependencies
        working-directory: frontend
        run: npm ci

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          CYPRESS_BASE_URL: http://localhost:3000
          CYPRESS_API_URL: http://localhost:8080
        continue-on-error: true

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs backend
          echo "=== Frontend logs ==="
          docker compose logs frontend
          echo "=== Postgres logs ==="
          docker compose logs postgres

      - name: Stop services
        if: always()
        run: docker compose down -v
